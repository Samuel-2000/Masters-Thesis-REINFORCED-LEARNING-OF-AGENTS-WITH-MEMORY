# Default configuration - updated with dynamic complexity parameters

experiment:
  name: "maze_rl_experiment"
  seed: 42
  use_wandb: false

environment:
  grid_size: 11
  max_steps: 50
  obstacle_fraction: 0.25
  n_food_sources: 4
  food_energy: 10.0
  initial_energy: 30.0
  energy_decay: 0.98
  energy_per_step: 0.1
  
  # New complexity parameters
  task_class: "basic"  # basic, doors, buttons, complex
  complexity_level: 0.0  # 0.0 to 1.0
  n_doors: 0
  door_open_duration: 10
  door_close_duration: 20
  n_buttons_per_door: 1
  button_break_probability: 0.0
  door_periodic: false

model:
  type: "lstm"  # lstm, transformer, multimemory
  hidden_size: 512
  use_auxiliary: false
  
  # Transformer-specific
  num_heads: 8
  num_layers: 3
  memory_size: 10
  
  # Multi-memory specific
  cache_size: 50

training:
  epochs: 10000
  batch_size: 64
  learning_rate: 0.0005
  optimizer: "adam"
  weight_decay: 0.0
  gamma: 0.97
  entropy_coef: 0.01
  max_grad_norm: 1.0
  save_interval: 1000
  test_interval: 1000
  use_auxiliary: false
  
  # NEW: Dynamic complexity adjustment
  dynamic_complexity: false  # Enable/disable dynamic complexity
  performance_window: 100  # Episodes to consider for performance
  complexity_increase_threshold: 0.7  # Performance threshold to increase complexity
  complexity_decrease_threshold: 0.3  # Performance threshold to decrease complexity
  complexity_step: 0.05  # How much to change complexity each adjustment
  min_complexity: 0.0  # Minimum complexity level
  max_complexity: 1.0  # Maximum complexity level
  adjustment_interval: 500  # How often to check for adjustment (epochs)
  curriculum_stages: ["basic", "doors", "buttons", "complex"]  # Progression of task classes

evaluation:
  test_episodes: 10
  benchmark_episodes: 20